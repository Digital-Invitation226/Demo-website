<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sarah & Michael | The Modern Edit</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Playfair+Display:ital@0;1&display=swap" rel="stylesheet">
    
    <!-- React & ReactDOM (Development versions show errors in console) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body {
            background-color: #FAFAFA;
            color: #111;
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow-x: hidden;
        }

        ::-webkit-scrollbar { width: 0px; background: transparent; }
        html { scroll-behavior: smooth; }

        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .text-gradient {
            background: linear-gradient(135deg, #111 0%, #666 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        @keyframes marquee {
            0% { transform: translateX(0%); }
            100% { transform: translateX(-50%); }
        }

        .animate-marquee {
            animation: marquee 20s linear infinite;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .fade-in {
            animation: fadeIn 0.6s ease-out forwards;
            opacity: 0; /* Start invisible until animation kicks in */
        }

        /* Staggered delays */
        .stagger-1 { animation-delay: 0.1s; }
        .stagger-2 { animation-delay: 0.2s; }
        .stagger-3 { animation-delay: 0.3s; }
        .stagger-4 { animation-delay: 0.4s; }
    </style>
</head>
<body class="antialiased selection:bg-black selection:text-white">
    
    <div id="root"></div>

    <!-- Added data-presets="react" to help Babel -->
    <script type="text/babel" data-presets="react">
        const { useState } = React;

        const DATA = {
            date: "June 15, 2026",
            groom: "Michael",
            bride: "Sarah",
            hashtag: "#SarahAndMichael2026"
        };

        const MEMORIES = [
          { url: 'https://images.unsplash.com/photo-1519741497674-611481863552?w=800&q=80', label: 'Beach Getaway', span: 'col-span-1' },
          { url: 'https://images.unsplash.com/photo-1529634597607-eb4a4c49d99a?w=800&q=80', label: 'Mountain Trip', span: 'col-span-2' },
          { url: 'https://images.unsplash.com/photo-1522673607200-164d1b6ce486?w=800&q=80', label: 'City Date', span: 'col-span-1' },
          { url: 'https://images.unsplash.com/photo-1516589178581-6cd7833ae3b2?w=800&q=80', label: 'Lakeside', span: 'col-span-1' },
          { url: 'https://images.unsplash.com/photo-1606800052052-a08af7148866?w=800&q=80', label: 'The Proposal', span: 'col-span-1' }
        ];

        const Navbar = () => (
            <nav className="fixed top-6 inset-x-0 mx-auto w-max z-50 glass-panel px-6 py-3 rounded-full shadow-sm flex items-center gap-6 fade-in">
                <span className="font-bold tracking-tight">S{"&"}M</span>
                <div className="w-px h-4 bg-gray-300"></div>
                <div className="flex gap-4 text-sm font-medium text-gray-500">
                    <a href="#story" className="hover:text-black transition-colors">Story</a>
                    <a href="#details" className="hover:text-black transition-colors">Details</a>
                    <a href="#memories" className="hover:text-black transition-colors">Gallery</a>
                    <a href="#rsvp" className="hover:text-black transition-colors">RSVP</a>
                </div>
            </nav>
        );

        const BentoCard = ({ children, className = '', delay = '' }) => (
            <div className={`bg-white rounded-[2rem] p-8 shadow-sm border border-gray-100 overflow-hidden relative transition-all hover:-translate-y-1 hover:shadow-lg fade-in ${delay} ${className}`}>
                {children}
            </div>
        );

        const Hero = () => (
            <section className="min-h-screen pt-32 pb-12 px-4 md:px-8">
                <div className="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-4 gap-4 h-full">
                    <BentoCard className="md:col-span-2 md:row-span-2 flex flex-col justify-between min-h-[400px] bg-gray-50" delay="stagger-1">
                        <div>
                            <div className="inline-block px-3 py-1 bg-black text-white rounded-full text-xs font-bold mb-4">
                                SAVE THE DATE
                            </div>
                            <h1 className="text-6xl md:text-8xl font-bold tracking-tighter leading-[0.9] text-gradient">
                                {DATA.bride} <br/> <span className="text-gray-300">{"&"}</span> {DATA.groom}
                            </h1>
                        </div>
                        <div className="flex justify-between items-end">
                            <p className="text-xl font-medium text-gray-500">Napa Valley, CA</p>
                            <div className="text-right">
                                <p className="text-3xl font-bold">15</p>
                                <p className="text-xs font-bold uppercase tracking-widest text-gray-400">June</p>
                            </div>
                        </div>
                    </BentoCard>

                    <BentoCard className="md:col-span-2 md:row-span-1 p-0 overflow-hidden h-64 md:h-auto group" delay="stagger-2">
                        <img 
                            src="https://images.unsplash.com/photo-1519741497674-611481863552?w=1200&q=80" 
                            className="w-full h-full object-cover transition-transform hover:scale-105"
                            alt="Hero"
                        />
                        <div className="absolute bottom-4 left-4 bg-white/90 backdrop-blur px-4 py-2 rounded-xl text-xs font-bold">
                            EST. 2022
                        </div>
                    </BentoCard>

                    <BentoCard className="md:col-span-1 bg-black text-white flex flex-col justify-center text-center" delay="stagger-3">
                        <p className="text-gray-400 text-xs font-bold uppercase mb-2">Days To Go</p>
                        <p className="text-6xl font-bold">392</p>
                    </BentoCard>

                    <a 
                        href="#rsvp"
                        className="md:col-span-1 bg-[#D4AF37] rounded-[2rem] flex items-center justify-center p-8 cursor-pointer shadow-lg transition-transform hover:scale-95 fade-in stagger-4"
                    >
                        <span className="text-white font-bold text-xl">RSVP NOW &rarr;</span>
                    </a>
                </div>
            </section>
        );

        const Marquee = () => (
            <div className="py-12 overflow-hidden bg-white border-y border-gray-100">
                <div className="flex whitespace-nowrap gap-8 text-6xl font-bold text-gray-200 uppercase tracking-tighter animate-marquee">
                    <span>Forever Starts Here</span>
                    <span>✦</span>
                    <span>Sarah {"&"} Michael</span>
                    <span>✦</span>
                    <span>June 15</span>
                    <span>✦</span>
                    <span>Forever Starts Here</span>
                    <span>✦</span>
                    <span>Sarah {"&"} Michael</span>
                    <span>✦</span>
                    <span>June 15</span>
                    <span>✦</span>
                </div>
            </div>
        );

        const Details = () => (
            <section id="details" className="py-24 px-4 bg-gray-50">
                <div className="max-w-5xl mx-auto">
                    <h2 className="text-4xl font-bold mb-12 text-center">The Itinerary</h2>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <BentoCard className="group cursor-default">
                            <div className="flex justify-between items-start mb-6">
                                <div className="p-3 bg-gray-100 rounded-2xl">
                                    <svg className="w-6 h-6 text-gray-700" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                                </div>
                                <span className="text-4xl font-bold text-gray-300 group-hover:text-black transition-colors">01</span>
                            </div>
                            <h3 className="text-2xl font-bold mb-1">The Ceremony</h3>
                            <p className="text-gray-500 mb-4">2:00 PM • St. Mary's Chapel</p>
                            <div className="h-40 bg-gray-200 rounded-2xl overflow-hidden">
                                <img src="https://images.unsplash.com/photo-1519167758481-83f29da8c286?w=800&q=80" className="w-full h-full object-cover grayscale group-hover:grayscale-0 transition-all duration-500" alt="Ceremony" />
                            </div>
                        </BentoCard>

                        <BentoCard className="group cursor-default">
                             <div className="flex justify-between items-start mb-6">
                                <div className="p-3 bg-gray-100 rounded-2xl">
                                    <svg className="w-6 h-6 text-gray-700" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
                                </div>
                                <span className="text-4xl font-bold text-gray-300 group-hover:text-black transition-colors">02</span>
                            </div>
                            <h3 className="text-2xl font-bold mb-1">The Reception</h3>
                            <p className="text-gray-500 mb-4">5:00 PM • Vineyard Estate</p>
                            <div className="h-40 bg-gray-200 rounded-2xl overflow-hidden">
                                <img src="https://images.unsplash.com/photo-1464366400600-7168b8af9bc3?w=800&q=80" className="w-full h-full object-cover grayscale group-hover:grayscale-0 transition-all duration-500" alt="Reception" />
                            </div>
                        </BentoCard>
                    </div>
                </div>
            </section>
        );

        const Gallery = () => (
            <section id="memories" className="py-24 px-4">
                <div className="max-w-7xl mx-auto">
                    <div className="flex justify-between items-end mb-12">
                         <h2 className="text-4xl md:text-6xl font-bold">Visuals</h2>
                        <p className="text-sm font-bold text-gray-400 uppercase tracking-widest">Selected Works</p>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-4 gap-4">
                        {MEMORIES.map((mem, i) => (
                            <div 
                                key={i}
                                className={`${mem.span} h-64 md:h-80 rounded-[2rem] overflow-hidden relative group cursor-pointer`}
                            >
                                <img 
                                    src={mem.url} 
                                    className="w-full h-full object-cover transition-transform hover:scale-110" 
                                    alt={mem.label}
                                />
                                <div className="absolute inset-0 bg-black/20 opacity-0 group-hover:opacity-100 transition-opacity flex items-end p-6">
                                    <p className="text-white font-bold text-lg">{mem.label}</p>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            </section>
        );

        const EntourageList = () => (
            <section className="py-24 bg-black text-white px-4">
                <div className="max-w-3xl mx-auto text-center">
                    <p className="text-gray-500 text-xs font-bold uppercase tracking-widest mb-4">Starring</p>
                    <h2 className="text-5xl md:text-7xl font-bold mb-16">The Entourage</h2>
                    
                    <div className="space-y-8">
                        <div className="grid grid-cols-2 gap-4 pb-8 border-b border-gray-800">
                             <div>
                                <p className="text-xs text-gray-500 uppercase mb-1">The Groom</p>
                                <p className="text-2xl font-bold">{DATA.groom} Anderson</p>
                             </div>
                             <div>
                                <p className="text-xs text-gray-500 uppercase mb-1">The Bride</p>
                                <p className="text-2xl font-bold">{DATA.bride} Martinez</p>
                             </div>
                        </div>
                        
                        <div className="py-4">
                             <p className="text-xs text-gray-500 uppercase mb-6">Principal Sponsors</p>
                             <div className="grid grid-cols-1 md:grid-cols-2 gap-4 text-lg text-gray-300">
                                <p>Dr. James Wilson</p> <p>Hon. Patricia Roberts</p>
                                <p>Mr. David Chen</p> <p>Mrs. Elizabeth Thompson</p>
                                <p>Mr. Robert Miller</p> <p>Mrs. Jennifer Davis</p>
                             </div>
                        </div>

                        <div className="grid grid-cols-2 gap-4 pt-8 border-t border-gray-800">
                             <div>
                                <p className="text-xs text-gray-500 uppercase mb-1">Best Man</p>
                                <p className="text-xl font-bold text-gray-300">Alex Johnson</p>
                             </div>
                             <div>
                                <p className="text-xs text-gray-500 uppercase mb-1">Maid of Honor</p>
                                <p className="text-xl font-bold text-gray-300">Emily Stevens</p>
                             </div>
                        </div>
                    </div>
                </div>
            </section>
        );

        const RSVP = () => (
            <section id="rsvp" className="py-32 px-4 flex justify-center">
                <div className="bg-[#FAFAFA] border border-gray-200 shadow-xl rounded-[3rem] p-12 md:p-20 text-center max-w-4xl w-full relative overflow-hidden">
                    <div className="absolute top-0 left-0 w-64 h-64 bg-blue-100 rounded-full mix-blend-multiply filter blur-3xl opacity-50"></div>
                    <div className="absolute bottom-0 right-0 w-64 h-64 bg-pink-100 rounded-full mix-blend-multiply filter blur-3xl opacity-50"></div>

                    <div className="relative z-10">
                        <h2 className="text-5xl md:text-7xl font-bold mb-6 tracking-tighter">Are you coming?</h2>
                        <p className="text-xl text-gray-500 mb-12 max-w-lg mx-auto">
                            We have reserved a seat for you. Please confirm your attendance by <span className="text-black font-bold">May 15, 2026</span>.
                        </p>
                        
                        <div className="flex flex-col md:flex-row gap-4 justify-center">
                            <a 
                                href="#" 
                                className="bg-black text-white px-10 py-4 rounded-full font-bold text-lg shadow-lg hover:bg-gray-800 transition-colors"
                            >
                                Confirm Attendance
                            </a>
                            <div 
                                className="px-10 py-4 rounded-full border border-gray-200 font-bold text-lg text-gray-500 flex items-center justify-center gap-2 cursor-pointer hover:bg-white transition-colors"
                                onClick={() => alert('Gift registry link here')}
                            >
                                <span>🎁 Gift Registry</span>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        );

        const Footer = () => (
            <footer className="py-12 text-center">
                <h1 className="text-[10vw] font-bold text-gray-100 leading-none select-none pointer-events-none">S {"&"} M</h1>
            </footer>
        );

        const App = () => (
            <div className="relative">
                <Navbar />
                <Hero />
                <Marquee />
                <Details />
                <Gallery />
                <EntourageList />
                <RSVP />
                <Footer />
            </div>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
